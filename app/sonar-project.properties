# =============================================================================
# app/sonar-project.properties — SonarQube Project Configuration
# =============================================================================
#
# This file is read by sonar-scanner when running analysis.
# The Jenkinsfile injects sonar.host.url and sonar.login via
# the withSonarQubeEnv() block, so only project metadata is here.

# ─── Project Identity ─────────────────────────────────────────────────────────
sonar.projectKey=nodejs-cicd-app
sonar.projectName=Node.js CI/CD Demo App
sonar.projectVersion=1.0

# ─── Source Code ──────────────────────────────────────────────────────────────
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude files/directories from analysis
sonar.exclusions=\
    **/node_modules/**, \
    **/coverage/**, \
    **/*.test.js, \
    **/*.spec.js, \
    **/tests/**, \
    **/dist/**

# ─── Test Configuration ───────────────────────────────────────────────────────
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# ─── Coverage Report ──────────────────────────────────────────────────────────
# Jest must generate lcov format coverage: jest --coverage --coverageReporters=lcov
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── Language ─────────────────────────────────────────────────────────────────
sonar.language=js

# ─── Quality Gate ─────────────────────────────────────────────────────────────
# The quality gate is configured in the SonarQube UI.
# Default "Sonar way" gate requires:
#   - No new bugs
#   - No new vulnerabilities
#   - New code coverage >= 80%
#   - Duplicated lines <= 3%
